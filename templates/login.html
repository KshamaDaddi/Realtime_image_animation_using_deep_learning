{% extends 'base.html' %}

{% block title %}Login - AnimeFly{% endblock %}

{% block content %}
    <div class="max-w-md mx-auto bg-gray-800 p-8 rounded-lg shadow-xl mt-10">
        <h2 class="text-3xl font-bold text-center mb-6 text-white">Log In</h2>
        
        <form method="post">
            {% csrf_token %}
            
            <!-- Display form errors -->
            {% if form.non_field_errors %}
                <div class="bg-red-800 border border-red-600 text-red-100 px-4 py-3 rounded-lg mb-4" role="alert">
                    {% for error in form.non_field_errors %}
                        <p>{{ error }}</p>
                    {% endfor %}
                </div>
            {% endif %}

            <div class="space-y-4">
                <div>
                    <label for="id_username" class="block text-sm font-medium text-gray-300 mb-1">Username</label>
                    <input type="text" name="username" autofocus autocapitalize="none" autocomplete="username" maxlength="150" required id="id_username"
                           class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label for="id_password" class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                    <input type="password" name="password" autocomplete="current-password" required id="id_password"
                           class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg text-lg shadow-lg transition duration-300 mt-8">
                Log In
            </button>
        </form>

        <p class="text-center text-gray-400 mt-6">
            Don't have an account? 
            <a href="{% url 'signup' %}" class="font-semibold text-blue-400 hover:text-blue-300">Sign up here</a>
        </p>
    </div>
{% endblock %}
